<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>To Do List CRUD</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>To Do List</h1>

    <!-- INPUT -->
    <input type="text" id="taskInput" placeholder="Masukkan tugas">
    <button onclick="tambahTugas()">Tambah</button>

    <!-- SEARCH -->
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Cari tugas...">
        <button onclick="cariTugas()">Cari</button>
        <button onclick="tampilkanTugas()">Reset</button>
    </div>

    <!-- LIST -->
    <ul id="taskList"></ul>
</div>

<script src="script.js"></script>
</body>
</html>
